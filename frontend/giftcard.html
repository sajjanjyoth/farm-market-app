<!DOCTYPE html>
<html>
<head>
<title>Gift Cards</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f1f3f6; }

/* HEADER */
.header {
    background:#198754;
    color:white;
    padding:15px;
    border-radius:0 0 12px 12px;
}

/* CARD */
.gift-card {
    border-radius:12px;
    transition:0.3s;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    cursor:pointer;
}
.gift-card:hover { transform:translateY(-5px); }

/* SELECTED */
.selected {
    border:2px solid #198754;
}

/* PRICE */
.price {
    font-size:22px;
    font-weight:bold;
    color:#198754;
}

/* BUTTON */
.btn-buy {
    background:#198754;
    color:white;
}

/* TOAST */
.toast-msg {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#198754;
    color:white;
    padding:10px 15px;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header text-center position-relative">
    <h4>💳 Gift Cards</h4>
    <button onclick="history.back()" 
        class="btn btn-light btn-sm position-absolute top-50 start-0 translate-middle-y ms-3">
        ← Back
    </button>
</div>

<!-- CARDS -->
<div class="container mt-4">
    <div class="row g-3">

        <div class="col-md-4">
            <div class="card gift-card p-3 text-center" onclick="selectCard(this,100)">
                <i class="bi bi-gift display-6 text-success"></i>
                <div class="price">₹100</div>
                <small>Basic Gift Card</small>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card gift-card p-3 text-center" onclick="selectCard(this,500)">
                <i class="bi bi-gift display-6 text-success"></i>
                <div class="price">₹500</div>
                <small>Popular Choice</small>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card gift-card p-3 text-center" onclick="selectCard(this,1000)">
                <i class="bi bi-gift display-6 text-success"></i>
                <div class="price">₹1000</div>
                <small>Best Value</small>
            </div>
        </div>

    </div>

    <!-- BUY BUTTON -->
    <div class="text-center mt-4">
        <button id="buyBtn" class="btn btn-buy px-4" onclick="buyCard()">
            Buy Gift Card
        </button>
    </div>

</div>

<script>

let selectedAmount = 0;

// SELECT CARD
function selectCard(el, amount){
    document.querySelectorAll(".gift-card").forEach(c => c.classList.remove("selected"));
    el.classList.add("selected");
    selectedAmount = amount;
}

// TOAST
function toast(msg){
    let t = document.createElement("div");
    t.className = "toast-msg";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

// BUY (SIMULATED PAYMENT)
function buyCard(){

    if(!selectedAmount){
        toast("Please select a gift card ❗");
        return;
    }

    let btn = document.getElementById("buyBtn");

    // loading state
    btn.innerText = "Processing...";
    btn.disabled = true;

    // simulate payment delay
    setTimeout(() => {

        // generate fake gift code
        let code = "GIFT" + Math.floor(Math.random()*100000);

        // store in localStorage
        let cards = JSON.parse(localStorage.getItem("giftCards")) || [];

        cards.push({
            amount: selectedAmount,
            code: code
        });

        localStorage.setItem("giftCards", JSON.stringify(cards));

        btn.innerText = "Buy Gift Card";
        btn.disabled = false;

        toast("Payment Successful 🎉");
        alert("Your Gift Code: " + code);

    }, 1500);
}

</script>

</body>
</html>
