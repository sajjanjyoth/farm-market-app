<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f1f3f6; }

.order-card{
background:white;border-radius:12px;padding:18px;margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.product-img{
width:70px;height:70px;object-fit:cover;
border-radius:8px;background:#eee;
}

.step-container{
display:flex;justify-content:space-between;margin-top:15px;
}

.step{flex:1;text-align:center;position:relative;}

.step::after{
content:"";position:absolute;top:12px;right:-50%;
width:100%;height:3px;background:#ccc;
}

.step:last-child::after{ display:none; }

.circle{
width:25px;height:25px;border-radius:50%;
background:#ccc;margin:auto;line-height:25px;
color:white;font-size:12px;
}

.active .circle{ background:#28a745; }
.active small{ color:#28a745;font-weight:600; }
</style>
</head>

<body>

<nav class="navbar bg-success p-3">
<div class="container d-flex justify-content-between">
<span class="text-white fw-bold">📦 My Orders</span>
<button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
</div>
</nav>

<div class="container mt-4">
<div id="orders"></div>
</div>

<script src="js/config.js"></script>

<script>
const token = localStorage.getItem("token");
const ordersDiv = document.getElementById("orders");

/* ✅ FIXED IMAGE FUNCTION */
function getImage(img){

    if(!img){
        return "https://dummyimage.com/70x70/cccccc/000000&text=No+Image";
    }

    if(img.startsWith("http")){
        return img;
    }

    // 🔥 ALWAYS USE /uploads
    return API_URL + "/uploads/" + img
        .replace("static/uploads/","")
        .replace("backend/uploads/","")
        .replace("uploads/","")
        .replace(/^\/+/,"")
        .replace(/\\/g,"/");
}

/* ================= LOAD ORDERS ================= */
async function loadOrders(){

    if(!token){
        location.href="login.html";
        return;
    }

    ordersDiv.innerHTML = "<p class='text-center'>Loading...</p>";

    try{
        const res = await fetch(API_URL+"/orders",{
            headers:{ Authorization:"Bearer "+token }
        });

        const data = await res.json();

        if(!res.ok){
            ordersDiv.innerHTML = "<h5 class='text-danger'>Failed ❌</h5>";
            return;
        }

        if(!Array.isArray(data) || data.length===0){
            ordersDiv.innerHTML = `
            <div class="text-center bg-white p-4 rounded shadow-sm">
                <h5>No Orders Yet 📦</h5>
                <a href="products.html" class="btn btn-success">Shop Now</a>
            </div>`;
            return;
        }

        let html = "";

        data.forEach(o=>{

            let itemsHTML = "";

            (o.items || []).forEach(i=>{

                const img = getImage(i.image);

                itemsHTML += `
                <div class="d-flex mb-2">
                    <img src="${img}" class="product-img me-2"
                    onerror="this.src='https://dummyimage.com/70x70/cccccc/000000&text=No+Image'">

                    <div>
                        <div>${i.name || "Product"}</div>
                        <small class="text-muted">
                            Qty: ${i.quantity || 1}
                        </small>
                    </div>
                </div>`;
            });

            const steps = ["pending","accepted","shipped","delivered"];
            let status = (o.status || "pending").toLowerCase();
            let index = steps.indexOf(status);
            if(index < 0) index = 0;

            let stepHTML = `<div class="step-container">`;
            steps.forEach((s,i)=>{
                stepHTML += `
                <div class="step ${i<=index?"active":""}">
                    <div class="circle">${i<=index?"✓":""}</div>
                    <small>${s}</small>
                </div>`;
            });
            stepHTML += `</div>`;

            const canCancel = !["shipped","delivered","cancelled"].includes(status);

            html += `
            <div class="order-card">

                <div class="d-flex justify-content-between">
                    <strong>Order #${o.id}</strong>
                    <span class="badge bg-${o.payment_status==="paid"?"success":"secondary"}">
                        ${o.payment_status || "paid"}
                    </span>
                </div>

                <hr>

                ${itemsHTML}

                <div><strong>Total:</strong> ₹${o.total || 0}</div>

                ${stepHTML}

                <div class="mt-2">
                    <span class="badge bg-info text-dark">${status}</span>
                </div>

                <div class="mt-3 d-flex gap-2">
                    <button onclick="track(${o.id})" class="btn btn-primary btn-sm">
                        Track
                    </button>

                    <button onclick="cancelOrder(${o.id})"
                        class="btn btn-danger btn-sm"
                        ${!canCancel?"disabled":""}>
                        Cancel
                    </button>
                </div>

            </div>`;
        });

        ordersDiv.innerHTML = html;

    }catch(err){
        console.error(err);
        ordersDiv.innerHTML = "<h5 class='text-danger'>Server error ❌</h5>";
    }
}

/* ================= CANCEL ================= */
async function cancelOrder(id){

    if(!confirm("Cancel order?")) return;

    try{
        const res = await fetch(API_URL+"/orders/"+id,{
            method:"DELETE",
            headers:{ Authorization:"Bearer "+token }
        });

        const data = await res.json();
        alert(data.message || "Cancelled");

        loadOrders();

    }catch{
        alert("Cancel failed ❌");
    }
}

/* ================= TRACK ================= */
function track(id){
    location.href = "order-tracking.html?id=" + id;
}

/* ================= LOGOUT ================= */
function logout(){
    localStorage.clear();
    location.href="login.html";
}

loadOrders();
</script>

</body>
</html>
