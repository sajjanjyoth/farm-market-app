<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { background:#f1f3f6; }

.track-card {
    background:white;
    border-radius:12px;
    padding:20px;
}

.product-img {
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:8px;
}

.step-container {
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}
.step {
    text-align:center;
    flex:1;
    position:relative;
}
.step::after {
    content:"";
    position:absolute;
    top:15px;
    right:-50%;
    width:100%;
    height:4px;
    background:#ccc;
}
.step:last-child::after { display:none; }

.circle {
    width:30px;
    height:30px;
    border-radius:50%;
    background:#ccc;
    margin:auto;
    line-height:30px;
    color:white;
}
.active .circle { background:#28a745; }
.active span { color:#28a745; font-weight:bold; }

#map {
    height:300px;
    border-radius:10px;
    margin-top:20px;
}

.otp-box input {
    width:60px;
    text-align:center;
    font-size:20px;
}
</style>
</head>

<body>

<nav class="navbar bg-success p-3">
<div class="container">
<h5 class="text-white">🚚 Track Order</h5>
<a href="orders.html" class="btn btn-light">Back</a>
</div>
</nav>

<div class="container mt-4">
<div id="tracking"></div>
</div>

<script src="js/config.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const token = localStorage.getItem("token");
const orderId = new URLSearchParams(location.search).get("id");

const steps = ["Pending","Accepted","Shipped","Out for Delivery","Delivered"];

// ================= LOAD TRACKING =================
async function loadTracking(){
try{
    const res = await fetch(API_URL + "/orders/" + orderId,{
        headers:{ Authorization:"Bearer "+token }
    });

    if(!res.ok) throw "Error";

    const o = await res.json();

    // ---------- FIX IMAGE PATH ----------
    let itemsHTML="";
    (o.items || []).forEach(i=>{
        let img = i.image
            ? (i.image.startsWith("http")
                ? i.image
                : API_URL + "/" + i.image.replace(/^\/+/,'')) // FIX //
            : "https://via.placeholder.com/80";

        itemsHTML += `
        <div class="d-flex align-items-center mb-3">
            <img src="${img}" class="product-img me-3">
            <div>
                <div><strong>${i.name || "Product"}</strong></div>
                <small>Qty: ${i.quantity}</small>
            </div>
        </div>`;
    });

    // ---------- STEP ----------
    let current = steps.indexOf(o.status);
    if(current < 0) current = 0;

    let stepHTML = `<div class="step-container">`;
    steps.forEach((s,i)=>{
        stepHTML += `
        <div class="step ${i<=current ? "active":""}">
            <div class="circle">${i<=current?"✓":""}</div>
            <span>${s}</span>
        </div>`;
    });
    stepHTML += `</div>`;

    const eta = o.estimated_delivery || "Today, 6 PM";

    document.getElementById("tracking").innerHTML = `
    <div class="track-card shadow-sm">

        <h5>Order #${o.id}</h5>
        <p>Status: <strong>${o.status}</strong></p>
        <p>Estimated Delivery: <strong>${eta}</strong></p>

        <hr>
        ${itemsHTML}

        <hr>
        <p><strong>Total:</strong> ₹${o.total || 0}</p>

        ${stepHTML}

        <div id="map"></div>

        ${o.status==="Out for Delivery" ? `
        <div class="mt-4">
            <h6>Enter OTP to confirm delivery</h6>
            <div class="otp-box d-flex gap-2">
                <input maxlength="1" class="form-control">
                <input maxlength="1" class="form-control">
                <input maxlength="1" class="form-control">
                <input maxlength="1" class="form-control">
            </div>
            <button onclick="verifyOTP()" class="btn btn-success mt-3">
                Confirm Delivery
            </button>
        </div>
        ` : ""}

    </div>
    `;

    initMap();

}catch(err){
    document.getElementById("tracking").innerHTML =
    "<h5 class='text-danger text-center'>Error loading ❌</h5>";
}
}

// ================= MAP (LEAFLET) =================
function initMap(){

    const user = [12.9716, 77.5946];      // user location
    const delivery = [12.9616, 77.5846];  // delivery boy

    const map = L.map('map').setView(user, 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // markers
    L.marker(user).addTo(map).bindPopup("You 🧍");
    const deliveryMarker = L.marker(delivery).addTo(map)
        .bindPopup("Delivery 🚚");

    // route
    L.polyline([user, delivery], { color:'green' }).addTo(map);

    // live movement (simulation)
    setInterval(()=>{
        delivery[0] += 0.0003;
        delivery[1] += 0.0003;
        deliveryMarker.setLatLng(delivery);
    }, 2000);
}

// ================= OTP =================
function verifyOTP(){
    const inputs = document.querySelectorAll(".otp-box input");
    let otp = "";

    inputs.forEach(i=> otp += i.value);

    if(otp.length !== 4){
        alert("Enter valid OTP ❌");
        return;
    }

    alert("Delivery Confirmed ✅");

    fetch(API_URL + "/orders/"+orderId+"/confirm",{
        method:"POST",
        headers:{ Authorization:"Bearer "+token }
    });

    loadTracking();
}

// INIT
loadTracking();
</script>

</body>
</html>
