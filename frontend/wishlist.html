<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist - Farmers Market</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f1f3f6;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
    background: #198754;
}

/* PRODUCT CARD */
.product-card {
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.product-card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.product-img {
    height: 180px;
    width: 100%;
    object-fit: cover;
}

/* CATEGORY */
.category-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #198754;
    color: #fff;
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 20px;
}

/* REMOVE BTN */
.remove-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    color: red;
    font-weight: bold;
}

/* TOAST */
.toast-msg {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #198754;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    z-index: 9999;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between">
    <h5 class="text-white m-0">❤️ Wishlist</h5>

    <div class="d-flex gap-2">
        <a href="products.html" class="btn btn-light btn-sm">Shop</a>
        <a href="cart.html" class="btn btn-warning btn-sm">Cart 🛒</a>
    </div>
</div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
<div class="row" id="wishlist"></div>
</div>

<script src="js/config.js"></script>

<script>

const API = API_URL.replace(/\/+$/, "");
const token = localStorage.getItem("token");

const box = document.getElementById("wishlist");

/* ================= AUTH CHECK ================= */
if (!token) {
    window.location.href = "login.html";
}

/* ================= TOAST ================= */
function toast(msg) {
    const t = document.createElement("div");
    t.className = "toast-msg";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

/* ================= IMAGE FIX ================= */
function getImageUrl(img) {

    if (!img) return `${API}/uploads/default.png`;
    if (img.startsWith("http")) return img;

    return `${API}/uploads/` +
        img.replace(/^\/+/, "")
           .replace("static/uploads/", "")
           .replace("uploads/", "");
}

/* ================= LOAD WISHLIST ================= */
async function loadWishlist() {

    try {

        box.innerHTML = "<p class='text-center'>Loading...</p>";

        const res = await fetch(`${API}/wishlist`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
            box.innerHTML = `
                <div class="text-center">
                    <h5>No items in wishlist ❤️</h5>
                    <a href="products.html" class="btn btn-success mt-2">Start Shopping</a>
                </div>`;
            return;
        }

        box.innerHTML = data.map(p => {

            const img = getImageUrl(p.image);

            return `
            <div class="col-md-3 mb-3">

                <div class="product-card">

                    <span class="category-badge">${p.category || ""}</span>

                    <!-- FIXED: product_id -->
                    <button class="remove-btn"
                        onclick="removeItem(${p.product_id})">×</button>

                    <img src="${img}"
                         class="product-img"
                         onerror="this.src='${API}/uploads/default.png'">

                    <div class="p-2">

                        <h6>${p.name || "No Name"}</h6>

                        <b>₹${p.price || 0}</b>

                        <button class="btn btn-success w-100 mt-2"
                            onclick="addToCart(${p.product_id})">
                            Add to Cart
                        </button>

                    </div>

                </div>

            </div>`;
        }).join("");

    } catch (err) {
        console.error(err);
        box.innerHTML = "<p class='text-danger text-center'>Failed to load wishlist ❌</p>";
    }
}

/* ================= ADD TO CART ================= */
async function addToCart(id) {

    try {

        await fetch(`${API}/cart`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                product_id: id,
                quantity: 1
            })
        });

        toast("Added to cart 🛒");

    } catch (err) {
        console.log(err);
        toast("Cart error ❌");
    }
}

/* ================= REMOVE ================= */
async function removeItem(id) {

    try {

        await fetch(`${API}/wishlist/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        toast("Removed ❤️");
        loadWishlist();

    } catch (err) {
        console.log(err);
        toast("Remove failed ❌");
    }
}

/* ================= INIT ================= */
loadWishlist();

</script>

</body>
</html>
