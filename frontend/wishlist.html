<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f6fa; }

.card {
    border-radius:15px;
    transition:0.3s;
    overflow:hidden;
}
.card:hover { transform:scale(1.02); }

.product-img {
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #ddd;
}

.heart {
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success p-3">
<div class="container d-flex justify-content-between">

<span class="navbar-brand">❤️ Wishlist</span>

<div>
<a href="products.html" class="btn btn-light me-2">Shop</a>
<a href="cart.html" class="btn btn-warning">Cart 🛒</a>
</div>

</div>
</nav>

<!-- MAIN -->
<div class="container mt-4">
<div id="wishlist"></div>
</div>

<script src="js/config.js"></script>

<script>
const token = localStorage.getItem("token");

// LOGIN CHECK
if(!token){
    alert("Login required ❌");
    location.href="login.html";
}

// LOAD WISHLIST
async function loadWishlist(){
try{
    const res = await fetch(API_URL+"/wishlist",{
        headers:{Authorization:"Bearer "+token}
    });

    const data = await res.json();

    if(!Array.isArray(data) || data.length===0){
        document.getElementById("wishlist").innerHTML =
        "<h5 class='text-center'>No items in wishlist ❤️</h5>";
        return;
    }

    let out="";

    data.forEach(p=>{

        // ✅ FIX IMAGE PATH
        let img = p.image 
        ? API_URL + p.image
        : "https://via.placeholder.com/150";

        out+=`
        <div class="card p-3 mb-3 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-3">

        <img src="${img}" class="product-img"
        onerror="this.src='https://via.placeholder.com/150'">

        <div>
        <h6 class="mb-1">${p.name}</h6>
        <p class="mb-0 text-muted">₹${p.price}</p>
        </div>

        </div>

        <div class="text-end">

        <button onclick="addToCart(${p.id})"
        class="btn btn-success btn-sm mb-2">
        Add to Cart
        </button>

        <br>

        <span class="heart text-danger"
        onclick="removeItem(${p.id})">❤️</span>

        </div>

        </div>
        </div>
        `;
    });

    document.getElementById("wishlist").innerHTML = out;

}catch(err){
    console.error(err);
    document.getElementById("wishlist").innerHTML =
    "<p class='text-danger'>Error loading wishlist ❌</p>";
}
}

loadWishlist();

// ADD TO CART
async function addToCart(productId){
try{
    const res = await fetch(API_URL+"/cart",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body: JSON.stringify({
            product_id: productId,
            quantity: 1
        })
    });

    if(!res.ok){
        alert("Failed ❌");
        return;
    }

    alert("Added to cart 🛒");

}catch(err){
    console.error(err);
    alert("Error ❌");
}
}

// REMOVE ITEM
async function removeItem(id){
try{
    await fetch(API_URL+"/wishlist/"+id,{
        method:"DELETE",
        headers:{Authorization:"Bearer "+token}
    });

    loadWishlist();

}catch(err){
    console.error(err);
    alert("Error removing ❌");
}
}
</script>

</body>
</html>
