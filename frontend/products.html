<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f1f3f6; font-family:'Segoe UI'; }
.navbar { background:#198754; }

.product-card {
    border-radius:14px;
    background:white;
    transition:0.3s;
}
.product-card:hover {
    transform:translateY(-5px);
}

.product-img {
    height:180px;
    object-fit:cover;
}

.category-badge {
    position:absolute;
    top:10px;
    left:10px;
    background:#198754;
    color:white;
    padding:3px 10px;
    border-radius:20px;
    font-size:11px;
}

.toast-msg {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#198754;
    color:white;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<nav class="navbar p-3">
<div class="container d-flex justify-content-between">
<h5 class="text-white">🛒 Farmers Market</h5>

<div>
<a href="cart.html" class="btn btn-light btn-sm">Cart</a>
<a href="orders.html" class="btn btn-warning btn-sm">Orders</a>
</div>
</div>
</nav>

<!-- 🔍 FILTERS -->
<div class="container mt-3">

<div class="row g-2">

<div class="col-md-3">
<input id="search" class="form-control" placeholder="Search products...">
</div>

<div class="col-md-2">
<select id="category" class="form-select">
<option value="">All</option>
<option>Fruits</option>
<option>Vegetables</option>
<option>Dairy</option>
<option>Grains</option>
</select>
</div>

<div class="col-md-2">
<input id="minPrice" type="number" class="form-control" placeholder="Min ₹">
</div>

<div class="col-md-2">
<input id="maxPrice" type="number" class="form-control" placeholder="Max ₹">
</div>

<div class="col-md-2">
<select id="sort" class="form-select">
<option value="">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>
</div>

<div class="col-md-1">
<button onclick="resetFilters()" class="btn btn-danger w-100">X</button>
</div>

</div>
</div>

<!-- PRODUCTS -->
<div class="container mt-3">
<div id="products" class="row"></div>
</div>

<script src="js/config.js"></script>

<script>
const token = localStorage.getItem("token");

let allProducts = [];

// 🔔 TOAST
function toast(msg){
let t=document.createElement("div");
t.className="toast-msg";
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

// 📦 LOAD PRODUCTS
async function loadProducts(){
products.innerHTML = "Loading...";

let res = await fetch(API_URL+"/products");
let data = await res.json();

allProducts = Array.isArray(data) ? data : [];
filterProducts();
}

// 🎯 FILTER LOGIC
function filterProducts(){

let text = search.value.toLowerCase();
let cat = category.value;
let min = Number(minPrice.value) || 0;
let max = Number(maxPrice.value) || Infinity;
let sortVal = sort.value;

let filtered = allProducts.filter(p =>
(p.name||"").toLowerCase().includes(text) &&
(!cat || p.category===cat) &&
(p.price >= min && p.price <= max)
);

// 🔽 SORT
if(sortVal==="low"){
filtered.sort((a,b)=>a.price-b.price);
}
if(sortVal==="high"){
filtered.sort((a,b)=>b.price-a.price);
}

showProducts(filtered);
}

// 🖼 SHOW PRODUCTS
function showProducts(data){

if(!data.length){
products.innerHTML="<h5>No products 😢</h5>";
return;
}

let out="";

data.forEach(p=>{

let img = p.image 
? API_URL + p.image 
: "static/no-image.png";

out+=`
<div class="col-md-3 mb-3">

<div class="card product-card position-relative">

<div class="category-badge">${p.category||""}</div>

<img src="${img}" class="product-img w-100"
onerror="this.src='static/no-image.png'"
onclick="viewProduct(${p.id})">

<div class="p-2">
<h6>${p.name}</h6>
<b>₹${p.price}</b>

<button onclick="addCart(${p.id})"
class="btn btn-success w-100 mt-2">Add</button>
</div>

</div>
</div>`;
});

products.innerHTML = out;
}

// 🛒 ADD CART
function addCart(id){
if(!token){ toast("Login required"); return; }

fetch(API_URL+"/cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({product_id:id,quantity:1})
})
.then(()=>toast("Added 🛒"));
}

// 🔗 VIEW
function viewProduct(id){
location.href="product-detail.html?id="+id;
}

// 🔄 RESET FILTERS
function resetFilters(){
search.value="";
category.value="";
minPrice.value="";
maxPrice.value="";
sort.value="";
filterProducts();
}

// EVENTS
search.oninput = filterProducts;
category.onchange = filterProducts;
minPrice.oninput = filterProducts;
maxPrice.oninput = filterProducts;
sort.onchange = filterProducts;

// INIT
loadProducts();
</script>

</body>
</html>
