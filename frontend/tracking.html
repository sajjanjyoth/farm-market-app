<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f1f3f6; }

.track-card {
    background:white;
    border-radius:10px;
    padding:20px;
}

/* STEP TRACKER */
.step-container {
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.step {
    text-align:center;
    flex:1;
    position:relative;
}

.step::after {
    content:"";
    position:absolute;
    top:15px;
    right:-50%;
    width:100%;
    height:4px;
    background:#ccc;
}

.step:last-child::after { display:none; }

.circle {
    width:30px;
    height:30px;
    border-radius:50%;
    background:#ccc;
    margin:auto;
    line-height:30px;
    color:white;
}

.active .circle { background:#28a745; }
.active span { color:#28a745; font-weight:bold; }

/* PRODUCT */
.product-img {
    width:80px;
    height:80px;
    border-radius:8px;
}

/* TIMELINE */
.timeline {
    border-left:3px solid #28a745;
    margin-top:20px;
    padding-left:15px;
}

.timeline-item {
    margin-bottom:15px;
}
</style>
</head>

<body>

<nav class="navbar bg-success p-3">
<div class="container">
<h5 class="text-white">🚚 Live Tracking</h5>
<a href="orders.html" class="btn btn-light">Back</a>
</div>
</nav>

<div class="container mt-4">
<div id="tracking"></div>
</div>

<script src="js/config.js"></script>

<script>
const token = localStorage.getItem("token");
const orderId = new URLSearchParams(location.search).get("id");

if(!token){
    alert("Login required ❌");
    location.href="login.html";
}

// STEPS
const steps = ["Pending","Accepted","Shipped","Out for Delivery","Delivered"];

// LOAD TRACKING
async function loadTracking(){

try{
    let res = await fetch(API_URL + "/orders/" + orderId,{
        headers:{ Authorization:"Bearer "+token }
    });

    let o = await res.json();

    // ITEMS
    let itemsHTML = "";
    if(o.items){
        o.items.forEach(i=>{
            let img = i.image ? API_URL+"/"+i.image : "https://via.placeholder.com/80";

            itemsHTML += `
            <div class="d-flex align-items-center mb-2">
                <img src="${img}" class="product-img me-2">
                <div>${i.name} (x${i.quantity})</div>
            </div>`;
        });
    }

    // STEP INDEX
    let current = steps.indexOf(o.status);
    if(current < 0) current = 0;

    // STEP UI
    let stepHTML = `<div class="step-container">`;
    steps.forEach((s,i)=>{
        stepHTML += `
        <div class="step ${i<=current ? "active":""}">
            <div class="circle">✓</div>
            <span>${s}</span>
        </div>`;
    });
    stepHTML += `</div>`;

    // 🕒 TIMELINE
    let timelineHTML = `<div class="timeline">`;

    if(o.timeline){
        o.timeline.forEach(t=>{
            timelineHTML += `
            <div class="timeline-item">
                <strong>${t.status}</strong><br>
                <small>${t.time}</small>
            </div>`;
        });
    } else {
        timelineHTML += `
        <div class="timeline-item">
            <strong>${o.status}</strong><br>
            <small>Updated recently</small>
        </div>`;
    }

    timelineHTML += `</div>`;

    // 📍 DELIVERY LOCATION (PLACEHOLDER)
    let mapHTML = `
    <div class="mt-3">
        <h6>📍 Delivery Location</h6>
        <div class="bg-light p-3 text-center rounded">
            Live map will appear here (requires GPS backend)
        </div>
    </div>`;

    // FINAL UI
    document.getElementById("tracking").innerHTML = `
    <div class="track-card shadow-sm">

        <h5>Order #${o.id}</h5>
        <p>Status: <strong>${o.status}</strong></p>

        <hr>

        ${itemsHTML}

        <p><strong>Total:</strong> ₹${o.total_amount || 0}</p>

        ${stepHTML}

        <h6 class="mt-4">🕒 Order Timeline</h6>
        ${timelineHTML}

        ${mapHTML}

    </div>`;
    
}catch{
    document.getElementById("tracking").innerHTML =
    "<h5 class='text-danger text-center'>Error loading tracking ❌</h5>";
}
}

// 🔄 AUTO REFRESH (LIVE)
setInterval(loadTracking, 5000);

// INIT
loadTracking();
</script>

</body>
