<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer Chat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f1f3f6; font-family:Segoe UI; }

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#198754;
color:white;
position:fixed;
padding:15px;
}
.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
border-radius:6px;
margin-bottom:5px;
}
.sidebar a:hover{background:#157347;}

.content{
margin-left:230px;
padding:20px;
display:flex;
height:100vh;
}

/* CHAT LIST */
.chat-list{
width:30%;
background:white;
border-radius:10px;
padding:10px;
overflow-y:auto;
}
.chat-user{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}
.chat-user:hover{ background:#f5f5f5; }

/* CHAT BOX */
.chat-box{
width:70%;
display:flex;
flex-direction:column;
margin-left:10px;
}
.messages{
flex:1;
background:white;
padding:10px;
overflow-y:auto;
border-radius:10px;
}
.msg{
padding:8px 12px;
margin:5px;
border-radius:10px;
max-width:60%;
}
.sent{
background:#198754;
color:white;
margin-left:auto;
}
.received{
background:#e4e6eb;
}
.input-box{
display:flex;
margin-top:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h4>🌾 Farmer</h4>
<a href="farmer_profile.html">👤 Profile</a>
<a href="add_product.html">➕ Add Product</a>
<a href="my_products.html">📦 My Products</a>
<a href="farmer_orders.html">📋 Orders</a>
<a href="farmer_chat.html">💬 Chat</a>
<a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

<!-- LEFT: ORDER LIST -->
<div class="chat-list" id="chatList">
    <h6>Orders</h6>
    <div>Loading...</div>
</div>

<!-- RIGHT: CHAT -->
<div class="chat-box">

    <div class="messages" id="chatBox">
        <p class="text-muted text-center">Select an order to chat</p>
    </div>

    <div class="input-box">
        <input id="msgInput" class="form-control" placeholder="Type message...">
        <button onclick="sendMessage()" class="btn btn-success ms-2">Send</button>
    </div>

</div>

</div>

<script src="js/config.js"></script>

<script>
const API = API_URL.replace(/\/+$/, "");
const token = localStorage.getItem("token");

let currentOrder = null;
let receiverId = null;
let myId = null;

/* ================= LOAD CURRENT USER ================= */
async function loadMe(){
    try{
        const res = await fetch(`${API}/farmer/me`,{
            headers:{ Authorization:`Bearer ${token}` }
        });
        const data = await res.json();
        myId = data.id;
    }catch{
        console.error("User fetch failed");
    }
}

/* ================= LOAD ORDERS ================= */
async function loadOrders(){
    try{
        const res = await fetch(`${API}/farmer/orders`,{
            headers:{ Authorization:`Bearer ${token}` }
        });

        const data = await res.json();

        if(!Array.isArray(data)){
            document.getElementById("chatList").innerHTML = "No orders";
            return;
        }

        document.getElementById("chatList").innerHTML = data.map(o => `
            <div class="chat-user" onclick="openChat(${o.id}, ${o.user_id})">
                <b>Order #${o.id}</b><br>
                <small>${o.customer_name || "Customer"}</small>
            </div>
        `).join("");

    }catch{
        document.getElementById("chatList").innerHTML = "Error loading orders ❌";
    }
}

/* ================= OPEN CHAT ================= */
function openChat(orderId, userId){
    currentOrder = orderId;
    receiverId = userId;
    loadChat();
}

/* ================= LOAD CHAT ================= */
async function loadChat(){

    if(!currentOrder) return;

    try{
        const res = await fetch(`${API}/farmer/chat/${currentOrder}`,{
            headers:{ Authorization:`Bearer ${token}` }
        });

        const data = await res.json();
        const box = document.getElementById("chatBox");

        if(!Array.isArray(data)){
            box.innerHTML = "<p>No messages</p>";
            return;
        }

        box.innerHTML = data.map(m => `
            <div class="msg ${m.sender_id === myId ? 'sent' : 'received'}">
                ${m.message}
            </div>
        `).join("");

        box.scrollTop = box.scrollHeight;

    }catch{
        console.error("Chat load failed");
    }
}

/* ================= SEND MESSAGE ================= */
async function sendMessage(){

    const input = document.getElementById("msgInput");
    const msg = input.value.trim();

    if(!msg || !currentOrder) return;

    try{
        const res = await fetch(`${API}/farmer/chat/send`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                Authorization:`Bearer ${token}`
            },
            body:JSON.stringify({
                order_id: currentOrder,
                receiver_id: receiverId,
                message: msg
            })
        });

        if(!res.ok){
            alert("Message failed ❌");
            return;
        }

        input.value="";
        loadChat();

    }catch{
        alert("Error sending message ❌");
    }
}

/* ================= AUTO REFRESH ================= */
setInterval(loadChat, 3000);

/* ================= LOGOUT ================= */
function logout(){
    localStorage.clear();
    location.href="login.html";
}

/* INIT */
loadMe();
loadOrders();
</script>

</body>
</html>
