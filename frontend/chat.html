<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f1f3f6; }

.chat-header {
    background:#198754;
    color:white;
    padding:12px;
    border-radius:10px;
    font-weight:500;
}

.chat-box {
    height:450px;
    overflow-y:auto;
    background:#e9ecef;
    padding:15px;
    border-radius:10px;
}

.msg {
    max-width:70%;
    padding:10px 12px;
    border-radius:12px;
    margin:8px 0;
    font-size:14px;
    position:relative;
}

.me {
    background:#dcf8c6;
    margin-left:auto;
    text-align:right;
}

.other {
    background:white;
    margin-right:auto;
}

.time {
    font-size:10px;
    opacity:0.6;
}

.delete-btn {
    position:absolute;
    top:2px;
    right:6px;
    font-size:12px;
    cursor:pointer;
    color:red;
    display:none;
}

.msg.me:hover .delete-btn {
    display:block;
}

.chat-input {
    background:white;
    padding:10px;
    border-radius:10px;
}

.empty {
    text-align:center;
    margin-top:150px;
    color:#888;
}
</style>
</head>

<body>

<div class="container mt-3">

<div class="chat-header d-flex justify-content-between align-items-center">
    <span id="chatTitle">💬 Chat</span>
    <button onclick="goBack()" class="btn btn-light btn-sm">⬅ Back</button>
</div>

<div id="chat" class="chat-box mt-2"></div>

<div class="chat-input d-flex mt-2">
    <input id="msg" class="form-control me-2" placeholder="Type a message...">
    <button onclick="send()" class="btn btn-success">Send</button>
</div>

</div>

<script src="js/config.js"></script>

<script>
const API = API_URL.replace(/\/+$/, "");
const token = localStorage.getItem("token");

// ✅ FIXED PARAM NAME
const receiverId = new URLSearchParams(location.search).get("receiver_id");

const chatDiv = document.getElementById("chat");
const msgInput = document.getElementById("msg");

// 🔐 GET USER ID FROM TOKEN
function getUserId(){
    try{
        return JSON.parse(atob(token.split('.')[1])).id;
    }catch{
        return null;
    }
}

// ⏱ TIME FORMAT
function formatTime(t){
    if(!t) return "";
    let d = new Date(t);
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

// 🚨 VALIDATION
if(!receiverId){
    chatDiv.innerHTML = "<p class='text-danger'>Invalid chat user ❌</p>";
    throw new Error("Missing receiver_id");
}

// 📦 LOAD CHAT
let lastCount = 0;

function loadChat(){

fetch(`${API}/chat/${receiverId}`,{
headers:{Authorization:"Bearer "+token}
})
.then(res=>{
    if(!res.ok) throw new Error();
    return res.json();
})
.then(data=>{

    if(!Array.isArray(data) || data.length===0){
        chatDiv.innerHTML = "<div class='empty'>No messages yet 💬</div>";
        return;
    }

    if(data.length === lastCount) return;
    lastCount = data.length;

    let userId = getUserId();
    let out="";

    data.forEach(m=>{
        let isMe = m.sender_id == userId;

        out += `
        <div class="msg ${isMe ? 'me':'other'}">
            ${isMe ? `<span class="delete-btn" onclick="deleteMsg(${m.id})">🗑</span>` : ""}
            ${m.message}
            <div class="time">${formatTime(m.created_at)}</div>
        </div>`;
    });

    chatDiv.innerHTML = out;
    chatDiv.scrollTop = chatDiv.scrollHeight;

})
.catch(()=>{
    chatDiv.innerHTML = "<p class='text-danger'>Error loading chat ❌</p>";
});
}

// 📤 SEND MESSAGE
function send(){

let message = msgInput.value.trim();

if(!message){
    msgInput.focus();
    return;
}

fetch(`${API}/chat`,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
receiver_id: receiverId,
message: message
})
})
.then(res=>{
    if(!res.ok) throw new Error();
    return res.json();
})
.then(()=>{
    msgInput.value="";
    loadChat();
})
.catch(()=>{
    alert("Send failed ❌");
});
}

// 🗑 DELETE
function deleteMsg(id){

if(!confirm("Delete this message?")) return;

fetch(`${API}/chat/${id}`,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
})
.then(()=>loadChat())
.catch(()=>alert("Delete failed ❌"));
}

// ⌨ ENTER
msgInput.addEventListener("keypress", function(e){
if(e.key === "Enter") send();
});

// 🔄 AUTO REFRESH
setInterval(loadChat, 2000);

// INIT
loadChat();

// BACK
function goBack(){
window.history.back();
}
</script>

</body>
</html>
