<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f1f3f6; }

/* Sidebar */
.sidebar {
    height:100vh;
    background:  #198754;
    color:white;
    padding:20px;
}
.sidebar a {
    display:block;
    padding:10px;
    color:white;
    text-decoration:none;
    border-radius:8px;
    margin-bottom:8px;
}
.sidebar a:hover { background:rgba(255,255,255,0.2); }

/* Cards */
.card-box {
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.card-box h2 { color:#2874f0; }

/* Tables */
.table { background:white; border-radius:10px; overflow:hidden; }
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar">
<h5>Admin Panel</h5>
<hr>
<a href="#" onclick="show('dashboard')">Dashboard</a>
<a href="#" onclick="show('products')">Products</a>
<a href="#" onclick="show('orders')">Orders</a>
<a href="#" onclick="show('usersSection')">Users</a>
<button onclick="logout()" class="btn btn-light w-100 mt-3">Logout</button>
</div>

<!-- MAIN -->
<div class="col-md-10 p-4">

<!-- DASHBOARD -->
<div id="dashboard">
<h3>📊 Dashboard</h3>

<div class="row g-4">

<div class="col-md-3">
<div class="card-box">
<h5>Users</h5>
<h2 id="userCount">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h5>Products</h5>
<h2 id="productCount">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h5>Orders</h5>
<h2 id="orderCount">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h5>Revenue</h5>
<h2 id="revenue">₹0</h2>
</div>
</div>

</div>

<hr>
<canvas id="chart"></canvas>
</div>

<!-- PRODUCTS -->
<div id="products" style="display:none">
<h3>Products</h3>

<input id="pname" placeholder="Name" class="form-control mb-2">
<input id="pprice" placeholder="Price" class="form-control mb-2">
<button onclick="addProduct()" class="btn btn-primary mb-3">Add</button>

<table class="table">
<thead><tr><th>ID</th><th>Name</th><th>Price</th><th></th></tr></thead>
<tbody id="productList"></tbody>
</table>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none">
<h3>Orders</h3>
<table class="table">
<thead><tr><th>ID</th><th>User</th><th>Total</th></tr></thead>
<tbody id="orderList"></tbody>
</table>
</div>

<!-- USERS -->
<div id="usersSection" style="display:none">
<h3>Users</h3>
<table class="table">
<thead><tr><th>ID</th><th>Name</th><th>Email</th></tr></thead>
<tbody id="userList"></tbody>
</table>
</div>

</div>
</div>
</div>

<script src="js/config.js"></script>

<script>
const token = localStorage.getItem("token");

if(!token){
    alert("Login required");
    location.href="login.html";
}

// SWITCH SECTIONS
function show(id){
    document.querySelectorAll("#dashboard,#products,#orders,#usersSection")
    .forEach(d=>d.style.display="none");

    document.getElementById(id).style.display="block";
}

// LOAD DATA
function loadData(){

// USERS
fetch(API_URL+"/users",{headers:{Authorization:"Bearer "+token}})
.then(r=>r.json())
.then(data=>{
    document.getElementById("userCount").innerText = data.length;

    let out="";
    data.forEach(u=>{
        out+=`<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td></tr>`;
    });
    document.getElementById("userList").innerHTML = out;
});

// PRODUCTS
fetch(API_URL+"/products")
.then(r=>r.json())
.then(data=>{
    document.getElementById("productCount").innerText = data.length;

    let out="";
    data.forEach(p=>{
        out+=`<tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>₹${p.price}</td>
        <td><button onclick="del(${p.id})" class="btn btn-danger btn-sm">X</button></td>
        </tr>`;
    });

    document.getElementById("productList").innerHTML = out;
});

// ORDERS
fetch(API_URL+"/orders",{headers:{Authorization:"Bearer "+token}})
.then(r=>r.json())
.then(data=>{
    document.getElementById("orderCount").innerText = data.length;

    let total=0, out="";
    data.forEach(o=>{
        total += o.total || 0;
        out+=`<tr><td>${o.id}</td><td>${o.user_id}</td><td>₹${o.total}</td></tr>`;
    });

    document.getElementById("orderList").innerHTML = out;
    document.getElementById("revenue").innerText = "₹"+total;

    // CHART
    new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:["Users","Products","Orders"],
            datasets:[{
                data:[
                    document.getElementById("userCount").innerText,
                    document.getElementById("productCount").innerText,
                    data.length
                ]
            }]
        }
    });
});
}

// ADD PRODUCT
function addProduct(){
    const name = pname.value;
    const price = parseFloat(pprice.value);

    fetch(API_URL+"/products",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            Authorization:"Bearer "+token
        },
        body:JSON.stringify({name,price})
    }).then(()=>loadData());
}

// DELETE PRODUCT
function del(id){
    fetch(API_URL+"/products/"+id,{
        method:"DELETE",
        headers:{Authorization:"Bearer "+token}
    }).then(()=>loadData());
}

// LOGOUT
function logout(){
    localStorage.clear();
    location.href="login.html";
}

loadData();
</script>

</body>
</html>
