<!DOCTYPE html>
<html>
<head>
<title>My Account</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: #f1f3f6;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
    background: #198754;
    color: white;
    padding: 15px;
    text-align: center;
    position: relative;
}

/* CART */
.cart {
    position: absolute;
    right: 15px;
    top: 15px;
    font-size: 18px;
}
.cart span {
    background: red;
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 50%;
    position: absolute;
    top: -8px;
    right: -10px;
}

/* PROFILE */
.profile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px;
    background: white;
    border-radius: 10px;
    margin: 10px;
}

.avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #198754;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* SECTIONS */
.section {
    background: white;
    margin: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.section-title {
    padding: 14px;
    font-weight: 500;
    cursor: pointer;
    background: #f8f9fa;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.section-title i {
    margin-right: 8px;
}

.section-content {
    display: none;
}

.item {
    padding: 12px 15px;
    border-top: 1px solid #eee;
    cursor: pointer;
}

.item:hover {
    background: #f1f3f6;
}

.logout {
    color: red;
    font-weight: 500;
}

/* BOTTOM NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 1px solid #ccc;
}

.bottom-nav div {
    text-align: center;
    font-size: 13px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h5>My Account</h5>

    <div class="cart">
        <i class="fa fa-shopping-cart"></i>
        <span id="cartCount">0</span>
    </div>
</div>

<!-- PROFILE -->
<div class="profile">
    <div class="avatar" id="avatar"></div>
    <div>
        <h6 id="userName" class="mb-0"></h6>
        <small id="userEmail"></small>
    </div>
</div>

<!-- SECTIONS -->

<!-- HELP -->
<div class="section">
    <div class="section-title" onclick="toggleSection(this)">
        <span><i class="fa fa-question-circle"></i> Help & Support</span>
        <i class="fa fa-chevron-down"></i>
    </div>
    <div class="section-content">
        <div class="item" onclick="goHelp()">Guide</div>
    </div>
</div>

<!-- OFFERS -->
<div class="section">
    <div class="section-title" onclick="toggleSection(this)">
        <span><i class="fa fa-gift"></i> Offers & Discounts</span>
        <i class="fa fa-chevron-down"></i>
    </div>
    <div class="section-content">
        <div class="item" onclick="goOffers()">Offers</div>
        <div class="item" onclick="goGift()">Gift Store</div>
        <div class="item" onclick="goGiftCard()">Gift Card</div>
    </div>
</div>

<!-- MORE -->
<div class="section">
    <div class="section-title" onclick="toggleSection(this)">
        <span><i class="fa fa-info-circle"></i> More Information</span>
        <i class="fa fa-chevron-down"></i>
    </div>
    <div class="section-content">
        <div class="item" onclick="goAbout()">About</div>
        <div class="item" onclick="goLegal()">Legal</div>
        <div class="item logout" onclick="logout()">Logout</div>
    </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <div onclick="goHome()">
        <i class="fa fa-home"></i>
        <p>Home</p>
    </div>
    <div>
        <i class="fa fa-list"></i>
        <p>Categories</p>
    </div>
    <div onclick="goWishlist()">
        <i class="fa fa-heart"></i>
        <p>Wishlist</p>
    </div>
    <div onclick="goOrders()">
        <i class="fa fa-box"></i>
        <p>Orders</p>
    </div>
</div>

<script>

// USER
let user = JSON.parse(localStorage.getItem("user"));

if (!user) window.location.href = "login.html";

// INITIALS
function getInitials(name){
    if(!name) return "";
    let w = name.split(" ");
    return (w[0][0] + (w[1] ? w[1][0] : "")).toUpperCase();
}

// SET USER
document.getElementById("userName").innerText = user.name || "User";
document.getElementById("userEmail").innerText = user.email || "";
document.getElementById("avatar").innerText = getInitials(user.name);

// CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
document.getElementById("cartCount").innerText = cart.length;

// TOGGLE
function toggleSection(el){
    let c = el.nextElementSibling;
    c.style.display = c.style.display === "block" ? "none" : "block";
}

// NAV
function goHome(){ location.href="products.html"; }
function goWishlist(){ location.href="wishlist.html"; }
function goOrders(){ location.href="orders.html"; }
function goHelp(){ location.href="help.html"; }
function goOffers(){ location.href="offers.html"; }
function goGift(){ location.href="gift.html"; }
function goGiftCard(){ location.href="giftcard.html"; }
function goAbout(){ location.href="about.html"; }
function goLegal(){ location.href="legal.html"; }

// LOGOUT
function logout(){
    localStorage.clear();
    location.href="login.html";
}

</script>

</body>
</html>
