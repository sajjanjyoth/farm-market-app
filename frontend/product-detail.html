<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f1f3f6; font-family:Segoe UI; }
.navbar { background:#198754; }

.product-box { background:white; border-radius:10px; padding:20px; }

.product-img {
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:10px;
}

.price { color:#28a745; font-size:22px; font-weight:bold; }
.old-price { text-decoration:line-through; color:#999; }

.qty-box button { width:35px; }

.farmer-box { background:#f9f9f9; padding:10px; border-radius:8px; }

.star { color:gold; }

.product-card {
    border-radius:14px;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    transition:0.3s;
}
.product-card:hover { transform:translateY(-5px); }

.product-img-small {
    height:180px;
    object-fit:cover;
    border-radius:14px 14px 0 0;
}

.category-badge {
    position:absolute;
    top:10px;
    left:10px;
    background:#198754;
    color:#fff;
    padding:3px 10px;
    border-radius:20px;
    font-size:11px;
}
</style>
</head>

<body>

<nav class="navbar p-3">
<div class="container d-flex justify-content-between">
<h5 class="text-white m-0">🌾 Product Details</h5>
<a href="products.html" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-4">

<div class="row">

<!-- IMAGE -->
<div class="col-md-5">
<img id="pImage" class="product-img">
</div>

<!-- DETAILS -->
<div class="col-md-7">
<div class="product-box shadow-sm">

<h4 id="pName"></h4>

<div>
<span class="price">₹<span id="pPrice"></span></span>
<span class="old-price ms-2">₹<span id="pOldPrice"></span></span>
</div>

<div id="rating"></div>

<p id="pUnit" class="text-muted"></p>
<p id="pDesc"></p>

<hr>

<h6>Select Variant</h6>
<div id="variants" class="d-flex flex-wrap gap-2 mb-3"></div>

<p class="text-muted">
Price per unit: ₹<span id="pricePerUnit"></span>
</p>

<!-- QUANTITY -->
<div class="qty-box d-flex align-items-center gap-2 mb-3">
<button class="btn btn-outline-secondary" onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button class="btn btn-outline-secondary" onclick="changeQty(1)">+</button>
</div>

<h5>Total: ₹<span id="totalPrice"></span></h5>

<button onclick="addToCart()" class="btn btn-warning w-100 mt-2">Add to Cart 🛒</button>
<button onclick="buyNow()" class="btn btn-success w-100 mt-2">Buy Now ⚡</button>
<button onclick="addWishlist()" class="btn btn-outline-danger w-100 mt-2">❤️ Wishlist</button>

<hr>

<!-- FARMER -->
<div class="farmer-box">
<h6>👨‍🌾 Farmer</h6>
<p id="fName"></p>
<p id="fLocation"></p>
<button onclick="chatFarmer()" class="btn btn-outline-success btn-sm">💬 Chat</button>
</div>

</div>
</div>

</div>

<!-- REVIEWS -->
<div class="mt-5">
<h5>⭐ Reviews</h5>

<div class="card p-3 mb-3">
<select id="userRating" class="form-select mb-2">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="userComment" class="form-control mb-2" placeholder="Write review"></textarea>
<button onclick="submitReview()" class="btn btn-success w-100">Submit</button>
</div>

<div id="reviews"></div>
</div>

<!-- RELATED -->
<div class="mt-5">
<h5>Related Products</h5>
<div class="row" id="related"></div>
</div>

</div>

<script src="js/config.js"></script>

<script>
const API = API_URL.replace(/\/+$/, "");
const token = localStorage.getItem("token");
const id = new URLSearchParams(location.search).get("id");

let product = {};
let qty = 1;
let selectedPrice = 0;
let selectedUnit = "kg";

const el = id => document.getElementById(id);

/* ================= IMAGE ================= */
function getImageUrl(path){
    if(!path) return `${API}/uploads/default.png`;
    if(path.startsWith("http")) return path;

    path = path.replace("static/uploads/","")
               .replace("uploads/","");

    return `${API}/uploads/${path}`;
}

/* ================= LOAD PRODUCT ================= */
async function loadProduct(){
    try{
        const res = await fetch(`${API}/products/${id}`);
        if(!res.ok) throw new Error("Product fetch failed");

        product = await res.json();

        el("pImage").src = getImageUrl(product.image);
        el("pName").innerText = product.name || "";
        el("pDesc").innerText = product.description || "";

        selectedPrice = product.price || 0;
        selectedUnit = product.unit || "kg";

        el("pPrice").innerText = selectedPrice;
        el("pOldPrice").innerText = selectedPrice + 20;
        el("pUnit").innerText = "per " + selectedUnit;
        el("pricePerUnit").innerText = selectedPrice;

        renderVariants(product.variants || []);

        let stars = "";
        for(let i=1;i<=5;i++){
            stars += i <= (product.rating || 4) ? "★" : "☆";
        }
        el("rating").innerHTML = `<span class="star">${stars}</span>`;

        el("fName").innerText = product.farmer_name || "Local Farmer";
        el("fLocation").innerText = product.location || "Nearby";

        updateTotal();
        loadReviews();
        loadRelated();

    }catch(err){
        console.error(err);
        alert("Failed to load product");
    }
}

/* ================= VARIANTS ================= */
function renderVariants(variants){

    const box = document.getElementById("variants");
    box.innerHTML = "";

    if(!variants.length){
        box.innerHTML = "<span class='text-muted'>No variants available</span>";
        return;
    }

    variants.forEach(v=>{
        const btn = document.createElement("button");

        btn.className = "btn btn-outline-success btn-sm";
        btn.innerText = `${v.qty}${v.unit} - ₹${v.price}`;

        btn.onclick = () => {
            selectedPrice = v.price;
            selectedUnit = v.unit;
            el("pUnit").innerText = "per " + v.unit;
            updateTotal();
        };

        box.appendChild(btn);
    });
}

/* ================= QTY ================= */
function changeQty(v){
    qty = Math.max(1, qty + v);
    el("qty").innerText = qty;
    updateTotal();
}

function updateTotal(){
    el("totalPrice").innerText = (qty * selectedPrice).toFixed(2);
}

/* ================= CART ================= */
async function addToCart(){

    if(!token){
        alert("Please login first");
        return;
    }

    try{
        const res = await fetch(`${API}/cart`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+token
            },
            body:JSON.stringify({
                product_id:product.id,
                quantity:qty,
                unit:selectedUnit
            })
        });

        if(!res.ok) throw new Error();
        alert("Added to cart");

    }catch(err){
        alert("Cart failed");
    }
}

/* ================= BUY ================= */
function buyNow(){
    localStorage.setItem("buyNowProduct",
        JSON.stringify({...product,quantity:qty,unit:selectedUnit})
    );
    location.href="checkout.html";
}

/* ================= WISHLIST ================= */
async function addWishlist(){

    if(!token){
        alert("Please login first");
        return;
    }

    try{
        const res = await fetch(`${API}/wishlist`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+token
            },
            body:JSON.stringify({product_id:product.id})
        });

        if(!res.ok){
            alert("Wishlist API not allowed (405) → fix backend");
            return;
        }

        alert("Added to wishlist ❤️");

    }catch(err){
        alert("Wishlist failed");
    }
}

/* ================= CHAT ================= */
function chatFarmer(){
    location.href="chat.html?receiver_id="+product.farmer_id;
}

/* ================= REVIEWS ================= */
async function submitReview(){

    if(!token){
        alert("Login required");
        return;
    }

    try{
        const res = await fetch(`${API}/reviews`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+token
            },
            body:JSON.stringify({
                product_id:product.id,
                rating:Number(el("userRating").value),
                comment:el("userComment").value
            })
        });

        if(!res.ok) throw new Error();

        el("userComment").value="";
        loadReviews();

    }catch(err){
        alert("Review failed");
    }
}

async function loadReviews(){

    try{
        const res = await fetch(`${API}/reviews/${id}`);
        const data = await res.json();

        el("reviews").innerHTML = (data || []).map(r=>`
            <div class="card p-2 mb-2">
                <strong>${r.username || "User"}</strong>
                <div>${"★".repeat(r.rating)}</div>
                <p>${r.comment || ""}</p>
            </div>
        `).join("") || "<p>No reviews</p>";

    }catch{
        el("reviews").innerHTML = "<p>Failed to load reviews</p>";
    }
}

/* ================= RELATED ================= */
async function loadRelated(){

    try{
        const res = await fetch(`${API}/products`);
        const data = await res.json();

        let all = Array.isArray(data) ? data : (data.products || []);

        let similar = all.filter(p =>
            p.category === product.category && p.id !== product.id
        );

        document.getElementById("related").innerHTML =
            similar.slice(0,4).map(p=>`
            <div class="col-md-3 mb-3">
            <div class="card product-card position-relative">

            <span class="category-badge">${p.category||""}</span>

            <img src="${getImageUrl(p.image)}" class="product-img-small w-100">

            <div class="p-2">
            <h6>${p.name}</h6>
            <b>₹${p.price}</b>

            <a href="product-detail.html?id=${p.id}"
               class="btn btn-success w-100 mt-2">View</a>
            </div>

            </div>
            </div>
            `).join("");

    }catch{
        console.log("Related products failed");
    }
}

loadProduct();
</script>

</body>
</html>
