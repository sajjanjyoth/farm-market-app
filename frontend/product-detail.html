<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f1f3f6; font-family:'Segoe UI'; }

.product-card {
    background:white;
    border-radius:14px;
    padding:20px;
}

.product-img {
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:10px;
}

.variant-box {
    border:1px solid #ccc;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    margin:4px;
    display:inline-block;
}

.active-variant {
    border:2px solid #198754;
    background:#e9f7ef;
}

.qty-box { display:flex; gap:5px; }

.review-box {
    background:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.stars i {
    font-size:20px;
    cursor:pointer;
    color:#ccc;
}
.stars i.active { color:#ffc107; }

.toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#198754;
    color:white;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container mt-4">

<a href="products.html" class="btn btn-light mb-3">⬅ Back</a>

<div id="product"></div>

<hr>

<h4>⭐ Reviews</h4>
<p id="avgRating">⭐ 0 (0 reviews)</p>
<div id="reviews"></div>

<h5>Add Review</h5>
<div class="stars mb-2" id="stars">
<i class="bi bi-star" onclick="setRating(1)"></i>
<i class="bi bi-star" onclick="setRating(2)"></i>
<i class="bi bi-star" onclick="setRating(3)"></i>
<i class="bi bi-star" onclick="setRating(4)"></i>
<i class="bi bi-star" onclick="setRating(5)"></i>
</div>

<textarea id="comment" class="form-control mb-2"></textarea>
<button onclick="submitReview()" class="btn btn-success">Submit</button>

<hr>

<h4>📦 Similar Products</h4>
<div class="row" id="similar"></div>

</div>

<script src="js/config.js"></script>

<script>
const productId = new URLSearchParams(location.search).get("id");
const token = localStorage.getItem("token");

let productData = null;
let selectedVariant = null;
let selectedIndex = 0;
let qty = 1;
let rating = 0;

// TOAST
function toast(msg){
    let t=document.createElement("div");
    t.className="toast";
    t.innerText=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

// LOAD PRODUCT
async function loadProduct(){
    let res = await fetch(API_URL+"/products/"+productId);
    let p = await res.json();

    productData = p;

    let img = p.image ? API_URL + p.image : "static/no-image.png";

    // default variant
    selectedVariant = p.variants?.[0];

    renderProduct(img);
}

// RENDER
function renderProduct(img){

    let variantsHTML = (productData.variants || []).map((v,i)=>`
    <span class="variant-box ${i===0?'active-variant':''}"
    onclick="selectVariant(${i})">
    ${v.qty} ${v.unit} - ₹${v.price}
    </span>
    `).join("");

    document.getElementById("product").innerHTML = `
    <div class="product-card">
    <div class="row">

    <div class="col-md-5">
    <img src="${img}" class="product-img"
    onerror="this.src='static/no-image.png'">
    </div>

    <div class="col-md-7">

    <h3>${productData.name}</h3>

    <p class="text-muted">Unit: ${productData.unit || "-"}</p>

    <h4 id="price">₹${selectedVariant?.price || productData.price}</h4>

    <p>${productData.description || ""}</p>

    ${variantsHTML ? `<div><b>Select Option:</b><br>${variantsHTML}</div>`:""}

    <div class="qty-box mt-3">
    <button onclick="changeQty(-1)" class="btn btn-success">-</button>
    <input id="qtyInput" value="1" style="width:50px;text-align:center">
    <button onclick="changeQty(1)" class="btn btn-success">+</button>
    </div>

    <div class="mt-3">
    <button onclick="addCart()" class="btn btn-warning">Add to Cart</button>
    <button onclick="buyNow()" class="btn btn-success">Buy Now</button>
    <button onclick="addWishlist()" class="btn btn-outline-danger">❤️</button>
    <button onclick="share()" class="btn btn-outline-primary">🔗</button>
    </div>

    </div>
    </div>
    </div>`;
}

// SELECT VARIANT
function selectVariant(i){
    selectedIndex = i;
    selectedVariant = productData.variants[i];
    qty = 1;

    document.getElementById("qtyInput").value = 1;
    document.getElementById("price").innerText = "₹"+selectedVariant.price;

    document.querySelectorAll(".variant-box")
    .forEach((el,index)=>{
        el.classList.toggle("active-variant", index===i);
    });
}

// QTY
function changeQty(v){
    qty += v;
    if(qty < 1) qty = 1;

    document.getElementById("qtyInput").value = qty;
}

// CART
function addCart(){
    if(!token){ toast("Login required"); return; }

    fetch(API_URL+"/cart",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body:JSON.stringify({
            product_id:productData.id,
            quantity:qty,
            variant:selectedVariant
        })
    })
    .then(()=>toast("Added 🛒"));
}

// BUY
function buyNow(){
    addCart();
    setTimeout(()=>location.href="cart.html",500);
}

// WISHLIST
function addWishlist(){
    if(!token){ toast("Login required"); return; }

    fetch(API_URL+"/wishlist/"+productData.id,{
        method:"POST",
        headers:{Authorization:"Bearer "+token}
    })
    .then(()=>toast("Added ❤️"));
}

// SHARE
function share(){
    navigator.clipboard.writeText(window.location.href);
    toast("Link copied 🔗");
}

// RATING
function setRating(r){
    rating=r;
    document.querySelectorAll("#stars i")
    .forEach((s,i)=>s.className=i<r?"bi bi-star-fill active":"bi bi-star");
}

// REVIEWS
async function loadReviews(){
    let r = await fetch(API_URL+"/reviews/"+productId);
    let data = await r.json();

    if(!Array.isArray(data)) data=[];

    let total=0;

    let out = data.map(x=>{
        total+=x.rating;
        return `<div class="review-box">
        <b>${x.username||"User"}</b>
        <div>⭐ ${x.rating}</div>
        <p>${x.comment}</p>
        </div>`;
    }).join("");

    let avg = data.length ? (total/data.length).toFixed(1) : 0;

    document.getElementById("avgRating").innerText =
    `⭐ ${avg} (${data.length} reviews)`;

    document.getElementById("reviews").innerHTML =
    out || "No reviews";
}

// ADD REVIEW
function submitReview(){
    let c = document.getElementById("comment").value;

    if(!rating || !c){
        toast("Fill all ❌");
        return;
    }

    fetch(API_URL+"/reviews",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            product_id:productId,
            rating:rating,
            comment:c
        })
    }).then(()=>{
        toast("Review added ⭐");
        document.getElementById("comment").value="";
        loadReviews();
    });
}

// SIMILAR
async function loadSimilar(){
    let r = await fetch(API_URL+"/products");
    let data = await r.json();

    let out = data.filter(p=>p.id!=productId).slice(0,4).map(p=>`
    <div class="col-md-3">
    <div class="card p-2" onclick="location.href='product-detail.html?id=${p.id}'">
    <img src="${p.image?API_URL+p.image:'static/no-image.png'}" height="150">
    <p>${p.name}</p>
    <b>₹${p.price}</b>
    </div>
    </div>`).join("");

    document.getElementById("similar").innerHTML = out;
}

// INIT
loadProduct();
loadReviews();
loadSimilar();

</script>

</body>
</html>
