<!DOCTYPE html>
<html>
<head>
<title>Login - Farmers Market</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #11998e, #38ef7d);
    height: 100vh;
}
.card {
    border-radius: 15px;
    text-align: center;
}
.logo {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 50%;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4 col-md-4">

    <!-- LOGO -->
    <img src="static/logo.jpeg" class="logo mb-2 mx-auto">

    <!-- HEADER -->
    <h2 class="text-success fw-bold">Farmers Market</h2>
    <p class="mb-4">Login to your account</p>

    <input id="email" class="form-control mb-3" placeholder="Enter Email">
    <input id="password" type="password" class="form-control mb-3" placeholder="Enter Password">

    <button onclick="login()" class="btn btn-success w-100 mb-2">
        Login
    </button>

    <p class="mt-2">
        Don’t have an account? <a href="register.html">Register</a>
    </p>

</div>

<script>

const API_URL = "http://127.0.0.1:8000"; // change if needed

async function login() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Enter email & password ❌");
        return;
    }

    try {
        let res = await fetch(API_URL + "/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        let data = await res.json();

        if (!res.ok) {
            alert(data.detail || "Login failed ❌");
            return;
        }

        // ✅ Save user + token
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        alert("Login successful ✅");

        window.location.href = "index.html";

    } catch (err) {
        alert("Server error ❌");
        console.log(err);
    }
}

</script>

</body>
</html>
