<!DOCTYPE html>
<html>
<head>
<title>Register - Farmers Market</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #56ab2f, #a8e063);
    height: 100vh;
}
.card {
    border-radius: 15px;
    text-align: center;
}
.logo {
    width: 60px;
    height: 60px;
    object-fit: cover;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4 col-md-4">

    <!-- LOGO -->
    <img src="static/logo.jpeg" class="logo mb-2 mx-auto">

    <!-- HEADER -->
    <h2 class="text-success fw-bold">Farmers Market</h2>
    <p class="mb-4">Create your account</p>

    <input id="name" class="form-control mb-3" placeholder="Enter Name">
    <input id="email" class="form-control mb-3" placeholder="Enter Email">
    <input id="password" type="password" class="form-control mb-3" placeholder="Enter Password">

    <select id="role" class="form-select mb-3">
        <option value="customer">Customer</option>
        <option value="farmer">Farmer</option>
        <option value="admin">Admin</option>
    </select>

    <button onclick="register()" class="btn btn-success w-100 mb-2">
        Register
    </button>

    <p class="mt-2">
        Already have an account? <a href="login.html">Login</a>
    </p>

</div>

<script>
const API_URL = "http://127.0.0.1:8000";

async function register() {

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let role = document.getElementById("role").value;

let res = await fetch(API_URL + "/register", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({name,email,password,role})
});

let data = await res.json();

if(!res.ok){
alert(data.detail || "Registration failed ❌");
return;
}

alert("Registered Successfully ✅");
window.location.href="login.html";
}
</script>

</body>
</html>
