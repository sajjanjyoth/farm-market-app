<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f1f3f6; font-family:Segoe UI; }

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#198754;
color:white;
position:fixed;
padding:15px;
}
.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
border-radius:6px;
margin-bottom:5px;
}
.sidebar a:hover{background:#157347;}

.content{
margin-left:230px;
padding:20px;
}

/* CARDS */
.card-box{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
text-align:center;
}

/* ORDER */
.order-card{
background:white;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
padding:15px;
margin-bottom:15px;
}

.order-header{
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
padding-bottom:10px;
margin-bottom:10px;
}

.badge{
font-size:12px;
padding:6px 10px;
text-transform:capitalize;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h4>🌾 Farmer</h4>
<a href="farmer_profile.html">👤 Profile</a>
<a href="add_product.html">➕ Add Product</a>
<a href="my_products.html">📦 My Products</a>
<a href="farmer_orders.html">📋 Orders</a>
<a href="farmer_chat.html">💬 Chat</a>
<a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

<div class="d-flex justify-content-between align-items-center mb-3">
<h3>📊 Dashboard</h3>
<button onclick="loadOrders()" class="btn btn-success btn-sm">Refresh 🔄</button>
</div>

<!-- STATS -->
<div class="row mb-4">
<div class="col-md-3"><div class="card-box"><h6>Total Orders</h6><h4 id="totalOrders">0</h4></div></div>
<div class="col-md-3"><div class="card-box"><h6>Revenue</h6><h4 id="totalRevenue">₹0</h4></div></div>
<div class="col-md-3"><div class="card-box"><h6>Pending</h6><h4 id="pendingOrders">0</h4></div></div>
<div class="col-md-3"><div class="card-box"><h6>Delivered</h6><h4 id="deliveredOrders">0</h4></div></div>
</div>

<!-- CHARTS -->
<div class="row mb-4">
<div class="col-md-6"><div class="card-box"><canvas id="ordersChart"></canvas></div></div>
<div class="col-md-6"><div class="card-box"><canvas id="revenueChart"></canvas></div></div>
</div>

<h3>📦 Orders</h3>
<div id="orders"></div>

</div>

<script src="js/config.js"></script>

<script>
const API = API_URL.replace(/\/+$/, "");
const token = localStorage.getItem("token");
const ordersDiv = document.getElementById("orders");

let ordersChart, revenueChart;

if (!token) {
    alert("Login required ❌");
    location.href = "login.html";
}

/* LOAD */
async function loadOrders(){
    ordersDiv.innerHTML = "Loading...";

    try{
        const res = await fetch(`${API}/farmer/orders`,{
            headers:{ Authorization:`Bearer ${token}` }
        });

        if(!res.ok){
            ordersDiv.innerHTML = "API Error ❌";
            return;
        }

        const data = await res.json();

        renderDashboard(data);
        renderOrders(data);

    }catch{
        ordersDiv.innerHTML = "Network Error ❌";
    }
}

/* DASHBOARD */
function renderDashboard(data){

    let total = data.length;
    let revenue = 0, pending = 0, delivered = 0;

    data.forEach(o=>{
        revenue += Number(o.total || 0);
        if(o.status === "pending") pending++;
        if(o.status === "delivered") delivered++;
    });

    totalOrders.innerText = total;
    totalRevenue.innerText = "₹" + revenue;
    pendingOrders.innerText = pending;
    deliveredOrders.innerText = delivered;

    if(ordersChart) ordersChart.destroy();
    if(revenueChart) revenueChart.destroy();

    ordersChart = new Chart(document.getElementById("ordersChart"),{
        type:"doughnut",
        data:{labels:["Pending","Delivered","Other"],
        datasets:[{data:[pending, delivered, total-pending-delivered]}]}
    });

    revenueChart = new Chart(document.getElementById("revenueChart"),{
        type:"bar",
        data:{
            labels:data.map(o=>"Order "+o.id),
            datasets:[{label:"Revenue", data:data.map(o=>o.total || 0)}]
        }
    });
}

/* ORDERS */
function renderOrders(list){

    if(!list.length){
        ordersDiv.innerHTML = "No orders 😢";
        return;
    }

    ordersDiv.innerHTML = list.map(o=>{

        const name = o.customer_name || "User";
        const phone = o.customer_phone || "—";
        const address = o.customer_address || "—";

        let items = "—";
        if(o.items?.length){
            items = o.items.map(i=>`• ${i.name} (x${i.quantity})`).join("<br>");
        }

        const status = o.status || "pending";

        return `
        <div class="order-card">
            <div class="order-header">
                <div>
                    <b>Order #${o.id}</b><br>
                    <small>${name} | ${phone}</small><br>
                    <small>${address}</small>
                </div>
                <div class="text-end">
                    <span class="badge bg-warning">${status}</span><br>
                    <b>₹${o.total || 0}</b>
                </div>
            </div>

            <div class="row">
                <div class="col-md-8">${items}</div>
                <div class="col-md-4">
                    <button onclick="updateStatus(${o.id},'accepted')" class="btn btn-success btn-sm mb-1">Accept</button>
                    <button onclick="updateStatus(${o.id},'cancelled')" class="btn btn-danger btn-sm">Reject</button>
                </div>
            </div>
        </div>`;
    }).join("");
}

/* UPDATE */
async function updateStatus(id,status){
    await fetch(`${API}/orders/${id}`,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            Authorization:`Bearer ${token}`
        },
        body:JSON.stringify({status})
    });

    loadOrders();
}

/* LOGOUT */
function logout(){
    localStorage.clear();
    location.href="login.html";
}

loadOrders();
</script>

</body>
</html>
