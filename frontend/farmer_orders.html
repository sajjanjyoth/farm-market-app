<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f6fa; font-family:Arial, sans-serif; }

.card { border-radius:12px; }

.table th, .table td { vertical-align: middle; }

.avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#198754;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.status-badge {
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

.btn-status { min-width:70px; margin:2px 0; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success p-3">
<div class="container d-flex justify-content-between">
    <span class="navbar-brand">📦 Farmer Orders</span>
    <div class="d-flex align-items-center">
        <div id="avatar" class="avatar me-2">U</div>
        
        <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
    </div>
</div>
</nav>

<!-- MAIN -->
<div class="container mt-4">
<h4 class="mb-3">📦 Orders Received</h4>
<div class="card p-3 shadow-sm">
<table class="table table-bordered table-striped">
<thead class="table-success">
<tr>
<th>ID</th>
<th>Customer</th>
<th>Address</th>
<th>Items</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="orderList">
<tr><td colspan="8" class="text-center">Loading...</td></tr>
</tbody>
</table>
</div>
</div>

<script>
const API_URL = "http://127.0.0.1:8000";
const token = localStorage.getItem("token");

// LOGIN CHECK
if(!token){
    alert("Login required ❌");
    location.href="login.html";
}

// LOAD USER
async function loadUser(){
    try{
        let res = await fetch(API_URL + "/profile", {
            headers:{ Authorization:"Bearer " + token }
        });

        if(!res.ok) throw new Error(`User fetch failed (${res.status})`);

        let data = await res.json();
        displayUser(data);

    } catch(err){
        console.error(err);

        // fallback to localStorage user
        const localUser = JSON.parse(localStorage.getItem("user"));
        if(localUser){
            displayUser(localUser);
        } else {
            alert("Failed to load user ❌");
        }
    }
}

function displayUser(data){
    const username = document.getElementById("username");
    const avatar = document.getElementById("avatar");

    username.innerText = data.name || "User";

    let initials = "U";
    if(data.name){
        let parts = data.name.split(" ");
        initials = parts.length > 1 ? parts[0][0]+parts[1][0] : parts[0][0];
    }
    avatar.innerText = initials.toUpperCase();
}

// LOAD ORDERS
async function loadOrders(){
    try{
        let res = await fetch(API_URL + "/farmer/orders", {
            headers:{ Authorization:"Bearer " + token }
        });

        if(!res.ok){
            if(res.status === 404){
                document.getElementById("orderList").innerHTML =
                    "<tr><td colspan='8' class='text-center'>No orders route found ❌</td></tr>";
                return;
            }
            throw new Error(`Orders fetch failed (${res.status})`);
        }

        let data = await res.json();
        if(!Array.isArray(data) || data.length === 0){
            document.getElementById("orderList").innerHTML =
                "<tr><td colspan='8' class='text-center'>No orders yet</td></tr>";
            return;
        }

        let out = "";
        data.forEach(o=>{
            let items = "—";
            if(o.items && Array.isArray(o.items)){
                items = o.items.map(i => `${i.name||"Item"} (${i.quantity||0})`).join("<br>");
            }

            let status = o.status || "Pending";
            let badgeClass =
                status === "Accepted" ? "bg-success" :
                status === "Rejected" ? "bg-danger" :
                status === "Delivered" ? "bg-primary" :
                "bg-warning text-dark";

            let actionBtns = "";
            if(status === "Pending"){
                actionBtns = `
                    <button class="btn btn-success btn-sm btn-status" onclick="updateStatus(${o.id}, 'Accepted')">Accept</button>
                    <button class="btn btn-danger btn-sm btn-status" onclick="updateStatus(${o.id}, 'Rejected')">Reject</button>
                `;
            } else if(status === "Accepted"){
                actionBtns = `
                    <button class="btn btn-primary btn-sm btn-status" onclick="updateStatus(${o.id}, 'Delivered')">Delivered</button>
                `;
            }

            actionBtns += `<br><button class="btn btn-secondary btn-sm btn-status mt-1" onclick="downloadInvoice(${o.id})">Invoice</button>`;

            out += `
            <tr>
                <td>${o.id}</td>
                <td>${o.customer_name || "—"}</td>
                <td>${o.phone || "—"}</td>
                <td>${o.address || "—"}</td>
                <td>${items}</td>
                <td>₹${o.total || 0}</td>
                <td><span class="badge ${badgeClass}">${status}</span></td>
                <td>${actionBtns}</td>
            </tr>
            `;
        });

        document.getElementById("orderList").innerHTML = out;

    } catch(err){
        console.error(err);
        document.getElementById("orderList").innerHTML =
            "<tr><td colspan='8' class='text-center text-danger'>Error loading orders ❌</td></tr>";
    }
}

// UPDATE STATUS
async function updateStatus(id, status){
    try{
        let res = await fetch(`${API_URL}/orders/${id}`, {
            method:"PUT",
            headers:{
                "Content-Type":"application/json",
                Authorization:"Bearer " + token
            },
            body: JSON.stringify({ status })
        });

        if(!res.ok) throw new Error(`Update failed (${res.status})`);

        loadOrders();

    } catch(err){
        console.error(err);
        alert("Failed to update order ❌");
    }
}

// DOWNLOAD INVOICE
function downloadInvoice(id){
    window.open(`${API_URL}/invoice/${id}`, "_blank");
}

// LOGOUT
function logout(){
    localStorage.clear();
    location.href="login.html";
}

// INIT
loadUser();
loadOrders();
</script>

</body>
</html>
