<!DOCTYPE html>
<html>
<head>
<title>Offers & Discounts</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f1f3f6; }

/* HEADER */
.header {
    background:#198754;
    color:white;
    padding:15px;
    border-radius:0 0 12px 12px;
}

/* CARD */
.offer-card {
    border-radius:12px;
    transition:0.3s;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.offer-card:hover { transform:translateY(-5px); }

/* ICON */
.icon-box {
    font-size:26px;
    width:50px;
    height:50px;
    background:#e9f7ef;
    color:#198754;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
}

/* CODE */
.code {
    background:#198754;
    color:white;
    padding:4px 10px;
    border-radius:6px;
    font-size:13px;
}

/* TIMER */
.timer {
    font-size:12px;
    color:#888;
}

/* TOAST */
.toast-msg {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#198754;
    color:white;
    padding:10px 15px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header text-center position-relative">
    <h4>🎁 Offers & Discounts</h4>
    <button onclick="history.back()" 
        class="btn btn-light btn-sm position-absolute top-50 start-0 translate-middle-y ms-3">
        ← Back
    </button>
</div>

<div class="container mt-4" id="offers"></div>

<script>
const offers = [
    {
        title: "20% OFF on Fruits",
        code: "FRUIT20",
        icon: "🔥",
        expiry: "2026-12-31"
    },
    {
        title: "10% OFF Vegetables",
        code: "VEG10",
        icon: "🥦",
        expiry: "2026-10-01"
    },
    {
        title: "Free Delivery",
        code: "",
        icon: "🚚",
        expiry: "2026-08-01"
    }
];

// TOAST
function toast(msg){
    let t = document.createElement("div");
    t.className = "toast-msg";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

// COPY CODE
function copyCode(code){
    navigator.clipboard.writeText(code);
    toast("Copied: " + code);
}

// APPLY CODE
function applyCode(code){
    localStorage.setItem("coupon", code);
    toast("Coupon Applied: " + code);
}

// TIMER
function getTimeLeft(date){
    let diff = new Date(date) - new Date();
    if(diff <= 0) return "Expired";

    let days = Math.floor(diff / (1000*60*60*24));
    return days + " days left";
}

// RENDER
function loadOffers(){
    const div = document.getElementById("offers");

    div.innerHTML = offers.map(o => `
    <div class="card offer-card p-3 mb-3">
        <div class="d-flex align-items-center gap-3">
            
            <div class="icon-box">${o.icon}</div>

            <div class="flex-grow-1">
                <h6>${o.title}</h6>

                ${o.code ? `
                    <small>
                        Code: <span class="code">${o.code}</span>
                    </small>
                    <br>
                    <button class="btn btn-sm btn-outline-success mt-1"
                        onclick="copyCode('${o.code}')">
                        Copy
                    </button>

                    <button class="btn btn-sm btn-success mt-1"
                        onclick="applyCode('${o.code}')">
                        Apply
                    </button>
                ` : ""}

                <div class="timer">${getTimeLeft(o.expiry)}</div>
            </div>

        </div>
    </div>
    `).join("");
}

loadOffers();
</script>

</body>
</html>
